name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run type checks
        run: npm run typecheck
