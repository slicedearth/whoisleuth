[build]
  command = "npm run build"
  publish = "frontend/build"
  functions = "netlify/functions"

[functions."scheduled-monitor"]
  schedule = "*/5 * * * *"

# Mirrors the response security headers server.mts sets for self-hosted
# deployments. SvelteKit emits a hash-restricted CSP meta tag in every
# prerendered page.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/lookup"
  to = "/.netlify/functions/lookup"
  status = 200
  force = true
  [redirects.rate_limit]
    window_limit = 1000
    window_size = 60
    aggregate_by = ["ip", "domain"]

[[redirects]]
  from = "/api/rdap"
  to = "/.netlify/functions/rdap"
  status = 200
  force = true

[[redirects]]
  from = "/api/whois"
  to = "/.netlify/functions/whois"
  status = 200
  force = true

[[redirects]]
  from = "/api/availability"
  to = "/.netlify/functions/availability"
  status = 200
  force = true

# The login function exports its own /api/login path and function-level rate
# limit. Its custom path removes the default direct function endpoint.

[[redirects]]
  from = "/api/logout"
  to = "/.netlify/functions/logout"
  status = 200
  force = true

[[redirects]]
  from = "/api/session"
  to = "/.netlify/functions/session"
  status = 200
  force = true

[[redirects]]
  from = "/api/capabilities"
  to = "/.netlify/functions/capabilities"
  status = 200
  force = true

[[redirects]]
  from = "/api/scheduled-monitor"
  to = "/.netlify/functions/scheduled-monitor-management"
  status = 200
  force = true

[[redirects]]
  from = "/api/ct-search"
  to = "/.netlify/functions/ct-search"
  status = 200
  force = true

[[redirects]]
  from = "/api/domain-posture"
  to = "/.netlify/functions/domain-posture"
  status = 200
  force = true
