[build]
  publish = "public"
  functions = "netlify/functions"

# Mirrors the security headers server.js sets for self-hosted deployments -
# applies to every response, static files and /api/* redirects alike, since
# Netlify serves public/ directly rather than through server.js.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[redirects]]
  from = "/api/lookup"
  to = "/.netlify/functions/lookup"
  status = 200
  force = true

[[redirects]]
  from = "/api/rdap"
  to = "/.netlify/functions/rdap"
  status = 200
  force = true

[[redirects]]
  from = "/api/whois"
  to = "/.netlify/functions/whois"
  status = 200
  force = true

